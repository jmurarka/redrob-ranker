ai_usage_summary: |
  Used Gemini 3.5 Flash via Antigravity pair-programming interface to design the rule-based funnel and test suite.

methodology_summary: |
  TalentMind AI v2 uses a hybrid two-phase architecture. Offline precomputation performs Stage 0 QA honeypot filtering, extracts multi-signal features (career relevance, behavior, trust, skills, experience), and encodes candidate profiles using local sentence-transformers (all-MiniLM-L6-v2). Online ranking runs a multi-path recall union (semantic + career + behavioral) to recall candidates, scores them using a profile-specific blended model (ML_ENGINEER), breaks ties with candidate ID ascending, and generates non-hallucinated explanations. CPU ranking runs in <1 second.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
