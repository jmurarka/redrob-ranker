ai_usage_summary: |
  Used Gemini 3.5 Flash via Antigravity pair-programming interface to design the rule-based funnel, run final audits, and test suites.

methodology_summary: |
  TalentMind AI v2 is a multi-signal candidate intelligence engine combining
  semantic retrieval, career trajectory analysis, behavioral signal integration,
  trust scoring, and growth potential classification. Offline precomputation
  generates all-MiniLM-L6-v2 embeddings (Option B structured text: role +
  top skills + career titles + summary excerpt) and structured feature vectors
  for all QA-validated candidates. A Candidate Quality Assurance Layer runs
  before embedding generation to eliminate honeypots and impossible profiles
  from the retrieval pool — not merely penalizing them in scoring. Runtime
  ranking uses a three-path recall architecture (Top 2000 semantic + Top 500
  career + Top 250 behavioral, union-deduplicated) to prevent strong candidates
  from being excluded by any single signal, directly addressing the challenge's
  hidden gems criterion. A six-component reranker (20% semantic, 25% career,
  20% skill, 10% experience, 10% behavioral, 10% trust) with role-aware weight
  profiles produces the final ranking. Growth Potential (High/Medium/Low),
  derived from career title progression and production evidence, is exposed as
  an auxiliary recruiter insight and reasoning label — not a ranking component —
  to maintain full methodology defensibility. All explanations are generated
  from verified candidate feature fields: zero hallucination by design.

precompute_required: true
precompute_runtime_minutes: 20
ranking_runtime_seconds: 15
model_used: all-MiniLM-L6-v2
no_gpu_required: true
no_network_at_ranking: true

