ai_usage_summary: |
  Used AI coding assistance during development for architecture critique, bug
  finding, documentation, and test/audit support. No hosted LLM/API calls are
  used during ranking.

methodology_summary: |
  TalentMind AI v2 is a multi-signal candidate intelligence engine combining
  semantic retrieval, career trajectory analysis, behavioral signal integration,
  trust scoring, growth scoring, and location/logistics fit. Offline
  precomputation generates all-MiniLM-L6-v2 embeddings and structured feature
  vectors for QA-validated candidates. A Candidate Quality Assurance Layer runs
  before embedding generation to eliminate honeypots and impossible profiles
  from the retrieval pool, not merely penalize them in scoring. Runtime ranking
  uses a three-path recall architecture (Top 2000 semantic + Top 500 career +
  Top 250 behavioral, union-deduplicated) to prevent strong candidates from
  being excluded by any single signal. An eight-component reranker (18%
  semantic, 24% career, 18% skill, 10% experience, 10% behavioral, 10% trust,
  5% growth, 5% logistics) with role-aware weight profiles produces the final
  ranking. Growth Potential is both a small ranking component and a
  recruiter-facing insight, while logistics explicitly accounts for the
  Pune/Noida/India relocation constraints. All explanations are generated from
  verified candidate feature fields: zero hallucination by design.

precompute_required: true
precompute_runtime_minutes: 20
ranking_runtime_seconds: 15
model_used: all-MiniLM-L6-v2
no_gpu_required: true
no_network_at_ranking: true

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
  monotonicity_verified: true
  reasoning_uniqueness_verified: true
